<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Student Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=1.0.0" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-card__header">
          <div class="brand-block brand-block--center">
            <img class="brand-block__logo" src="images/logo.png" alt="HunarX logo" />
            <div>
              <p class="auth-card__eyebrow">JS Student Portal</p>
              <h2 id="recoveryTitle">Reset your password</h2>
              <p class="auth-card__subtitle">
                Enter a new password to finish recovering your account.
              </p>
            </div>
          </div>
        </div>

        <form id="recoveryForm" class="auth-form">
          <div class="auth-form__field">
            <label for="newPasswordInput">New password</label>
            <input
              id="newPasswordInput"
              name="newPassword"
              type="password"
              required
              minlength="8"
              autocomplete="new-password"
              placeholder="At least 8 characters"
            />
          </div>

          <div class="auth-form__field">
            <label for="confirmNewPasswordInput">Confirm new password</label>
            <input
              id="confirmNewPasswordInput"
              name="confirmNewPassword"
              type="password"
              required
              minlength="8"
              autocomplete="new-password"
              placeholder="Confirm new password"
            />
          </div>

          <div id="recoveryMessage" class="auth-form__message" role="alert"></div>

          <button id="recoverySubmitBtn" class="auth-form__submit" type="submit">
            Update password
          </button>
          <a class="auth-form__toggle-link" href="index.html">
            Back to login
          </a>
        </form>
      </div>
    </div>

    <footer class="site-footer">
      <span>Built by <a href="https://www.hunarx.com" target="_blank" rel="noopener noreferrer">HunarX</a></span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="reset-password.js?v=1.0.0"></script>
  </body>
</html>
